name: BaariWala CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v3
      with:
        node-version: 20.x
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Lint Code
      run: npx eslint src/
      
    - name: Type Check
      run: npx tsc --noEmit
      
    - name: Build
      run: npm run build
      
    - name: Run Tests
      run: npm run test --if-present

  docker-build-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Login to Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Build and push backend image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ghcr.io/${{ github.repository }}/baariwala-api:latest,ghcr.io/${{ github.repository }}/baariwala-api:${{ github.sha }}

  trigger-deployment:
    needs: docker-build-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Call Deployment Webhook
      run: |
        curl -X POST https://api.baariwala.com/api/v1/deployment/webhook \
        -H "Content-Type: application/json" \
        -d '{
          "environment": "PRODUCTION",
          "version": "${{ github.sha }}",
          "commitHash": "${{ github.sha }}",
          "status": "SUCCESS",
          "deployedBy": "GitHub Actions",
          "logsUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        }'
